name: Daily Scraper Run

on:
  schedule:
    # Runs at 12:00 PM UTC every day
    - cron: '0 12 * * *'
  workflow_dispatch: 
    # This allows to manually trigger the workflow from the GitHub Actions tab

permissions:
  contents: write # This permission is required for the bot to push code back to the repo

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the scraper
        run: python3 main.py

      - name: Commit and push generated files
        run: |
          # Configure Git to use the GitHub Actions bot account
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Force add the folders in case they were previously ignored
          git add -f output/ latest_output/ logs/
          
          # Check if there are actually any changes to commit
          if git diff --staged --quiet; then
            echo "No new data generated. Skipping commit."
          else
            git commit -m "Automated run: Update scraper outputs and logs"
            
            # Pull with rebase to avoid conflicts if someone else pushed to main while the script was running
            git pull --rebase origin main
            
            # Push the changes back to the repository
            git push origin main
          fi